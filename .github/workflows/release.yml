# タグ push で起動するリリース自動化（RELEASE.md 3.2）。
# analyze / test を再実行してから release ビルド → ad-hoc 署名 → dmg 化 →
# GitHub Release 作成（dmg + CHANGELOG 該当節を添付）。
#
# 使い方:
#   1. CHANGELOG の [Unreleased] を [x.y.z] - YYYY-MM-DD に確定
#   2. apps/desktop/pubspec.yaml の version を上げてコミット（PR → マージ）
#   3. git tag v<x.y.z> && git push origin v<x.y.z>
#
# `-` を含むタグ（例: v0.0.1-citest）は prerelease として作成される。
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.5
          cache: true

      - name: Enforce lockfiles
        run: |
          (cd packages/core && dart pub get --enforce-lockfile)
          (cd apps/desktop && flutter pub get --enforce-lockfile)

      - name: Analyze and test
        run: |
          (cd packages/core && dart analyze && dart test)
          (cd apps/desktop && flutter analyze && flutter test)

      - name: Build macOS app (release)
        run: flutter build macos --release
        working-directory: apps/desktop

      # 当面は ad-hoc 署名（RELEASE.md 4 章。Swift 版と同じ）。
      # 初回起動時の Gatekeeper 警告は README の回避手順で対応する
      - name: Ad-hoc sign
        run: >
          codesign --force --deep --sign -
          "apps/desktop/build/macos/Build/Products/Release/moost_desktop.app"

      - name: Create dmg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist/dmg
          cp -R "apps/desktop/build/macos/Build/Products/Release/moost_desktop.app" \
            "dist/dmg/Moost.app"
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "Moost $VERSION" -srcfolder dist/dmg \
            -ov -format UDZO "dist/Moost-$VERSION.dmg"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      # CHANGELOG から「## [x.y.z]」〜次の「## [」直前までを抜き出す。
      # 該当節がないタグ（テストタグ等）は定型文にフォールバックする
      - name: Extract changelog section
        run: |
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            /^## \[/ {flag=0}
            flag' CHANGELOG.md > RELEASE_NOTES.md
          if ! grep -q '[^[:space:]]' RELEASE_NOTES.md; then
            echo "(CHANGELOG に $VERSION の節がありません)" > RELEASE_NOTES.md
          fi

      # インストールコマンドをノート末尾に付ける（gh CLI 経由の DL は
      # quarantine が付かず Gatekeeper 警告なしで起動できる）
      - name: Append install command
        run: |
          cat >> RELEASE_NOTES.md << EOF

          ## インストール

          \`\`\`bash
          gh release download $GITHUB_REF_NAME -R ${{ github.repository }} -p '*.dmg' -O /tmp/Moost.dmg
          hdiutil attach /tmp/Moost.dmg -nobrowse
          cp -R "/Volumes/Moost $VERSION/Moost.app" /Applications/
          hdiutil detach "/Volumes/Moost $VERSION"
          rm /tmp/Moost.dmg
          open /Applications/Moost.app
          \`\`\`
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          case "$GITHUB_REF_NAME" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          gh release create "$GITHUB_REF_NAME" "dist/Moost-$VERSION.dmg" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            $PRERELEASE_FLAG

      # Homebrew tap の cask を新バージョンへ書き換える（Issue #11）。
      # GITHUB_TOKEN は自リポジトリにしか効かないため、tap への push は
      # 書き込み可 deploy key（secret: TAP_DEPLOY_KEY）で行う。
      # prerelease（タグに '-' 入り）は brew に流さない
      - name: Bump Homebrew tap
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          SHA256=$(shasum -a 256 "dist/Moost-$VERSION.dmg" | awk '{print $1}')

          mkdir -p ~/.ssh
          printf '%s\n' "$TAP_DEPLOY_KEY" > ~/.ssh/tap_deploy_key
          chmod 600 ~/.ssh/tap_deploy_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy_key -o StrictHostKeyChecking=accept-new"

          git clone --depth 1 git@github.com:rami2076/homebrew-tap.git tap
          cd tap

          # sed での部分置換はフォーマット変化に弱いため、cask は毎回丸ごと生成する
          cat > Casks/moost.rb << EOF
          cask "moost" do
            version "$VERSION"
            sha256 "$SHA256"

            url "https://github.com/${{ github.repository }}/releases/download/v#{version}/Moost-#{version}.dmg"
            name "Moost"
            desc "Attach memos to AI coding agent sessions and resume them from the system tray"
            homepage "https://github.com/${{ github.repository }}"

            app "Moost.app"

            caveats <<~EOS
              Moost is currently ad-hoc signed. If Gatekeeper blocks the first launch,
              remove the quarantine attribute:

                xattr -dr com.apple.quarantine /Applications/Moost.app
            EOS
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/moost.rb
          git commit -m "moost $VERSION"
          git push origin main
