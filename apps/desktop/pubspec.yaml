name: moost_desktop
description: Moost desktop app — session memos and one-click resume (macOS first).
publish_to: 'none'

# バージョンの単一情報源（RELEASE.md 1.2）。設定画面の表示もここから取得する
version: 1.6.1+8

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  moost_core:
    path: ../../packages/core
  cupertino_icons: ^1.0.8
  # トレイ常駐（design.md 6.1）。バージョンは公開 7 日超のものに固定
  # （supply-chain rules/dart.md）。native は AppKit UI API のみ使用と監査済み。
  tray_manager: 0.5.3
  window_manager: 0.5.1
  # マルチディスプレイでのポップオーバー配置（Issue #16）。
  # 既存の推移的依存を lockfile と同一バージョンで直接依存へ昇格
  screen_retriever: 0.2.2
  # バージョン表示・更新チェックの自バージョン取得（RELEASE.md 1.2 の単一情報源）。
  # 10.2.1 は公開 7 日未満のため 10.2.0 に固定（supply-chain rules/dart.md）
  package_info_plus: 10.2.0
  # 登録プロジェクトのフォルダ選択ダイアログ（Issue #29 フォローアップ）。
  # publisher: flutter.dev（verified）。macOS 実装は NSOpenPanel を
  # beginSheetModal(for:) でポップオーバー自身のウィンドウにシート表示する
  # ため、osascript の別ウィンドウ方式と違いポップオーバーが隠れない。
  # Windows/Linux 対応（Issue #15）でも同じ API が使える
  file_selector: 1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # gen_l10n による文言の外部化（requirements.md 非機能要件: i18n）
  generate: true
  assets:
    - assets/tray_icon.png
